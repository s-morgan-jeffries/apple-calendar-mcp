name: Feature Request
description: Suggest a new feature or enhancement for the Apple Calendar MCP server
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear description of the feature you'd like.
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
      placeholder: |
        When I try to ... I need to ... but currently ...
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API surface
      description: If you have ideas about the tool name, parameters, or return shape.
      placeholder: |
        Tool: `get_availability`
        Parameters: calendar_name, start_date, end_date
        Returns: list of free/busy time blocks
    validations:
      required: false

  - type: input
    id: calendar-ui-feature
    attributes:
      label: Calendar UI feature
      description: Which Calendar.app feature does this map to, if any?
      placeholder: "e.g., availability overlay, recurring events, travel time"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references.
    validations:
      required: false
